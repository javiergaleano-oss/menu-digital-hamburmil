{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">{{ categoria }}</h2>

<div class="row">

    {% for producto in productos %}
        <div class="col-12 col-md-6 col-lg-4 mb-4">

            <div class="card shadow p-3 h-100">

                <h5 class="fw-bold">{{ producto.DESCRIPCION }}</h5>

                <p class="fs-5 text-success">
                    $ {{ "{:,.0f}".format(producto.PRECIO) }}
                </p>

                <form action="/agregar" method="POST">
                    <input type="hidden" name="referencia" value="{{ producto.REFERENCIA }}">
                    <input type="hidden" name="descripcion" value="{{ producto.DESCRIPCION }}">
                    <input type="hidden" name="precio" value="{{ producto.PRECIO }}">
                    <input type="hidden" name="categoria" value="{{ categoria }}">

                    <button type="submit" class="btn btn-primary w-100">
                        Agregar al pedido
                    </button>
                </form>

            </div>

        </div>
    {% endfor %}

</div>

<a href="/" class="btn btn-secondary w-100 mt-3">
    Volver
</a>

{% endblock %}
