<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Digital</title>

    <!-- RESPONSIVE CLAVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            overflow-x: hidden; /* evita desbordamiento */
        }

        .card {
            border-radius: 15px;
            word-wrap: break-word;
        }

        .btn {
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
        }

        .navbar-carrito {
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        h2 {
            font-weight: bold;
            text-align: center;
        }

        h5, p {
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .card {
                margin-bottom: 15px;
            }
        }

        @media (max-width: 576px) {
            h2 {
                font-size: 20px;
            }

            h5 {
                font-size: 16px;
            }

            p {
                font-size: 14px;
            }

            .btn {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<!-- BARRA SUPERIOR -->
<div class="navbar-carrito bg-dark text-white p-3 d-flex justify-content-between align-items-center flex-wrap">

    <!-- Cantidad -->
    <div>
        🛒 {{ carrito_cantidad }} productos
    </div>

    <!-- Total -->
    <div>
        $ {{ "{:,.0f}".format(carrito_total) }}
    </div>

    <!-- Botones -->
    <div class="d-flex gap-2">
        <a href="/carrito" class="btn btn-warning btn-sm">
            Ver carrito
        </a>

        <a href="{{ url_for('reporte') }}" class="btn btn-success btn-sm">
            📊 Reporte
        </a>
    </div>

</div>

<!-- CONTENIDO -->
<div class="container-fluid mt-3 px-3">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
