<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Digital</title>

    <!-- RESPONSIVE CLAVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            border-radius: 15px;
        }

        .btn {
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
        }

        .navbar-carrito {
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        h2 {
            font-weight: bold;
            text-align: center;
        }

        @media (max-width: 768px) {
            .card {
                margin-bottom: 15px;
            }
        }
    </style>
</head>

<body>

<!-- BARRA SUPERIOR FIJA -->
<div class="navbar-carrito bg-dark text-white p-3 d-flex justify-content-between align-items-center">

    <div>
        🛒 {{ carrito_cantidad }} productos
    </div>

    <div>
        $ {{ "{:,.0f}".format(carrito_total) }}
    </div>

    <div>
        <a href="/carrito" class="btn btn-warning btn-sm">
            Ver carrito
        </a>
    </div>

</div>

<div class="container-fluid mt-3 px-3">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
